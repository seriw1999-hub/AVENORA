<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avenora Travel</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Trocchi&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- AOS animasiya -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <!-- CSS – sırayla yüklənir, ən ümumi → ən xüsusi -->
    <link rel="stylesheet" href="assets/css/base/reset.css">
    <link rel="stylesheet" href="assets/css/base/typography.css">
    <link rel="stylesheet" href="assets/css/base/variables.css">

    <link rel="stylesheet" href="assets/css/components/buttons.css">
    <link rel="stylesheet" href="assets/css/components/card.css">
    <link rel="stylesheet" href="assets/css/components/navbar.css">
    <link rel="stylesheet" href="assets/css/components/scroll-carousel.css">
    <!-- digər komponentlər -->

    <link rel="stylesheet" href="assets/css/layout/grid.css">
    <link rel="stylesheet" href="assets/css/layout/header.css">
    <link rel="stylesheet" href="assets/css/layout/footer.css">
    <link rel="stylesheet" href="assets/css/layout/sections.css">

    <!-- səhifəyə xas -->
    <link rel="stylesheet" href="assets/css/pages/auth.css">

    <!-- ən sonda main – override üçün -->
    <link rel="stylesheet" href="assets/css/main.css">

    <link rel="icon" type="image/png" href="assets/images/logo/extension_icon (1).png">
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-100 rounded-full blur-[120px] opacity-50"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-100 rounded-full blur-[120px] opacity-50">
    </div>

    <div
        class="w-full max-w-[1100px] grid lg:grid-cols-2 bg-white rounded-[40px] shadow-2xl shadow-blue-100 overflow-hidden relative z-10 border border-white">

        <div class="hidden lg:block relative bg-slate-900 overflow-hidden">
            <img src="./assets/images/backgrounds/bg hero.png" class="w-full h-full object-cover opacity-60">
            <div class="absolute inset-0 p-12 flex flex-col justify-between text-white">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-none rounded-xl flex items-center justify-center"><img
                            src="./assets/images/logo/extension_icon (1).png" alt="Avenora Logo" class="w-10 h-10">
                    </div>
                    <span class="text-xl font-extrabold tracking-tight uppercase">Avenora</span>
                </a>
                <div>
                    <h2 class="text-4xl font-extrabold mb-4 leading-tight">Dünyanı bizimlə <br> kəşf etməyə başla.</h2>
                    <p class="text-slate-300">Sənin üçün ən özəl turlar və lüks otellər bir klik uzaqlıqdadır.</p>
                </div>
                <p class="text-sm text-slate-400">© 2026 Avenora Travel. Bütün hüquqlar qorunur.</p>
            </div>
        </div>

        <div class="p-8 md:p-16 flex flex-col justify-center">

            <div id="auth-header" class="mb-10">
                <h1 id="auth-title" class="text-3xl font-black text-slate-900 mb-2">Xoş Gəlmisiniz!</h1>
                <p id="auth-desc" class="text-slate-500">Davam etmək üçün hesabınıza giriş edin.</p>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event)" class="space-y-5">
                <div id="name-field" class="hidden">
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Ad
                        Soyad</label>
                    <div class="relative">
                        <i class="fa-regular fa-user absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="full-name" placeholder="Məs: Seriyye Cəfərova"
                            class="w-full pl-12 pr-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">E-poçt
                        ünvanı</label>
                    <div class="relative">
                        <i class="fa-regular fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="email" id="email" required placeholder="example@mail.com"
                            class="w-full pl-12 pr-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Şifrə</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" id="password" required placeholder="••••••••"
                            class="w-full pl-12 pr-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                </div>

                <button type="submit" id="submit-btn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-lg shadow-blue-100 transition-all active:scale-[0.98] mt-4">
                    GİRİŞ ET
                </button>
            </form>

            <div class="mt-8 text-center">
                <p id="switch-text" class="text-slate-500 text-sm">
                    Hesabınız yoxdur?
                    <button onclick="toggleAuth()" class="text-blue-600 font-bold hover:underline">Qeydiyyatdan
                        keçin</button>
                </p>
            </div>
        </div>
    </div>



    <script src="https://cdn.tailwindcss.com"></script>
    <script src="assets/js/pages/auth.js"></script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.css"></script>
    <script>
        // AOS-u Tailwind yükləndikdən sonra başlatmaq daha yaxşıdır
        window.addEventListener('load', () => {
            AOS.init({
                duration: 800,
                once: true,
                easing: 'ease-out'
            });
        });
    </script>
</body>

</html>

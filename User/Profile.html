<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilim - Avenora Travel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/main.css">
</head>

<body class="bg-slate-50 min-h-screen">
    <main class="container mx-auto px-6 pt-32 pb-12">
        <div class="max-w-2xl mx-auto bg-white rounded-[32px] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-8 border-b border-slate-50 bg-slate-50/50">
                <h1 class="text-2xl font-black text-slate-900">Profil Məlumatları</h1>
                <p class="text-slate-500 text-sm">Şəxsi məlumatlarınızı buradan idarə edə bilərsiniz.</p>
            </div>

            <form id="profile-form" class="p-8 space-y-6">
                <div class="flex justify-center mb-8">
                    <div class="relative">
                        <img id="profile-img" src="" class="w-24 h-24 rounded-full border-4 border-white shadow-lg">
                        <div class="absolute bottom-0 right-0 bg-blue-600 text-white p-2 rounded-full text-xs">
                            <i class="fa-solid fa-camera"></i>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Tam
                        Adınız</label>
                    <input type="text" id="profile-name"
                        class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">E-poçt
                        Ünvanı</label>
                    <input type="email" id="profile-email"
                        class="w-full px-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>

                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-lg shadow-blue-100 transition-all active:scale-[0.98]">
                    YADDA SAXLA
                </button>
            </form>
        </div>
    </main>

    <script src="../assets/js/components/navbar.js"></script>
    <script src="../assets/js/pages/user.js"></script>
</body>

</html>
